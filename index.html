    <title>539 三柱 1800碰 實戰勝率與損益統計儀表板</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --panel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --accent-col1: #ff7e42;
            --accent-col2: #10b981;
            --accent-col3: #3b82f6;
            --success: #15803d;
            --success-bg: #dcfce7;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); padding: 24px; line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #1e293b, #0f172a); color: #ffffff; padding: 24px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        header h1 { font-size: 24px; font-weight: 700; }
        header p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .stat-card .label { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card.profit-positive { background-color: var(--success-bg); border-color: #bbf7d0; }
        .stat-card.profit-positive .value { color: var(--success); }
        .stat-card.profit-negative { background-color: var(--danger-bg); border-color: #fecaca; }
        .stat-card.profit-negative .value { color: var(--danger); }
        
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 24px; margin-bottom: 24px; }
        .panel-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--bg-main); display: flex; justify-content: space-between; align-items: center; }
        
        .settings-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; background: #f8fafc; padding: 16px; border-radius: 8px; border: 1px dashed var(--border-color); }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
